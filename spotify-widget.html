<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spotify Widget</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;800&family=Cormorant+Garamond:wght@500;600;700&family=Marcellus&display=swap');
    :root{--ruby-main:#b5121b;--ruby-light:#ff5a3d;--gold-light:#f4d88b;--text-bright:#fff7e1;--font-display:'Cinzel',serif;--font-body:'Cormorant Garamond',serif;--font-ui:'Marcellus',serif}*{box-sizing:border-box}html,body{width:100%;height:100%;margin:0;background:transparent;overflow:hidden}body{color:#f6e6b5;font-family:var(--font-body);-webkit-font-smoothing:antialiased}.spotify-widget{position:relative;width:100%;height:100%;padding:7px 12px;overflow:hidden;border-left:1px solid rgba(216,169,74,.78);border-right:1px solid rgba(216,169,74,.78);background:radial-gradient(circle at 12% 28%,rgba(181,18,27,.14),transparent 34%),linear-gradient(180deg,rgba(10,2,4,.38),rgba(7,1,3,.5));box-shadow:none}.spotify-widget:before,.spotify-widget:after{content:'';position:absolute;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(216,169,74,.72),transparent);pointer-events:none}.spotify-widget:before{top:0}.spotify-widget:after{bottom:0}.spotify-widget__content{position:relative;z-index:2;display:grid;grid-template-columns:72px minmax(0,1fr);gap:12px;align-items:center;width:100%;height:100%}.spotify-widget__art-shell{position:relative;width:66px;height:66px;overflow:hidden;border:1px solid rgba(216,169,74,.68);border-radius:10px;background:linear-gradient(180deg,rgba(15,4,7,.76),rgba(7,2,4,.84)),radial-gradient(circle at 50% 30%,rgba(181,18,27,.14),transparent 42%);box-shadow:0 0 12px rgba(255,59,31,.08)}.spotify-widget__art-shell:after{content:'\266A';position:absolute;inset:0;display:grid;place-items:center;color:var(--gold-light);font-family:var(--font-display);font-size:40px;line-height:1;text-shadow:0 0 14px rgba(216,169,74,.18);opacity:0;pointer-events:none}.spotify-widget.is-empty .spotify-widget__art-shell:after{opacity:1}.album-art,.album-art img{position:absolute;inset:0;width:100%;height:100%;display:block}.album-art img{object-fit:cover}.spotify-widget.is-empty .album-art img{opacity:0}.spotify-widget__copy{min-width:0;display:flex;flex-direction:column;gap:4px}.track-name{overflow:hidden;color:var(--text-bright);font-family:var(--font-display);font-size:20px;line-height:1;text-overflow:ellipsis;white-space:nowrap;text-shadow:0 0 14px rgba(216,169,74,.12)}.artist-name{overflow:hidden;color:var(--ruby-light);font-family:var(--font-body);font-size:17px;font-weight:700;line-height:1;text-overflow:ellipsis;white-space:nowrap}.spotify-status{min-height:18px;display:flex;align-items:center;gap:10px}.status-text{color:var(--gold-light);font-family:var(--font-ui);font-size:10px;letter-spacing:.08em;text-transform:uppercase}.status-dot{width:7px;height:7px;border-radius:50%;background:radial-gradient(circle,#ffd9c9 0%,var(--ruby-main) 46%,#6d090d 100%);box-shadow:0 0 12px rgba(255,59,31,.36)}.auth-button{display:none}.widget-progress{position:relative;width:min(330px,82%);height:10px;margin-top:1px}.widget-progress__track{position:absolute;inset:4px 0;border:1px solid rgba(216,169,74,.64);border-radius:999px;background:rgba(8,2,4,.42)}.progress-bar{position:absolute;left:3px;top:3px;bottom:3px;width:0%;max-width:calc(100% - 6px);border-radius:999px;background:linear-gradient(90deg,rgba(181,18,27,.96),rgba(255,90,61,.88));box-shadow:0 0 10px rgba(255,59,31,.14);transition:width 1s linear}.spotify-widget.is-paused .progress-bar,.spotify-widget.is-idle .progress-bar{opacity:.56}
  </style>
</head>
<body>
  <div class="spotify-widget is-idle is-empty" id="spotifyWidget">
    <div class="spotify-widget__content">
      <div class="spotify-widget__art-shell"><div class="album-art"><img alt="Album Art" id="albumImage"></div></div>
      <div class="spotify-widget__copy">
        <div class="track-name" id="trackName">Conectando Spotify</div>
        <div class="artist-name" id="artistName">Preparando autorizacion segura</div>
        <div class="spotify-status"><span class="status-dot"></span><span class="status-text" id="statusText">Conectando</span><button class="auth-button" id="authButton" onclick="connectSpotify()">Conectar</button></div>
        <div class="widget-progress"><div class="widget-progress__track"></div><div class="progress-bar" id="progressBar"></div></div>
      </div>
    </div>
  </div>
  <script>
    const SPOTIFY_CONFIG={clientId:'bad57584024a467e8ed3aa6676d1fd32',fallbackRedirectUri:'https://astrozeta.github.io/spotywidget/spotify-widget.html',scopes:'user-read-currently-playing user-read-playback-state'};
    const FALLBACK_SVG='data:image/svg+xml;utf8,'+encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160"><rect width="160" height="160" fill="#120407"/><circle cx="80" cy="80" r="54" fill="#5b090d" stroke="#d8a94a" stroke-width="3"/><text x="80" y="98" text-anchor="middle" font-size="72" fill="#f4d88b" font-family="serif">♪</text></svg>`);const AUTH_COOLDOWN_MS=15000;
    function getRedirectUri(){if(window.location.protocol==='https:'||window.location.protocol==='http:')return`${window.location.origin}${window.location.pathname}`;return SPOTIFY_CONFIG.fallbackRedirectUri}function base64UrlEncode(buffer){return btoa(String.fromCharCode(...new Uint8Array(buffer))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'')}function generateCodeVerifier(length=96){const possible='ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-._~';const values=crypto.getRandomValues(new Uint8Array(length));return Array.from(values,value=>possible[value%possible.length]).join('')}async function generateCodeChallenge(codeVerifier){const encoded=new TextEncoder().encode(codeVerifier);const digest=await crypto.subtle.digest('SHA-256',encoded);return base64UrlEncode(digest)}
    class SpotifyWidget{constructor(){this.accessToken=null;this.tokenExpiry=null;this.refreshToken=null;this.currentTrack=null;this.isPlaying=false;this.progress=0;this.duration=0;this.elements={widget:document.getElementById('spotifyWidget'),trackName:document.getElementById('trackName'),artistName:document.getElementById('artistName'),albumImage:document.getElementById('albumImage'),authButton:document.getElementById('authButton'),progressBar:document.getElementById('progressBar'),statusText:document.getElementById('statusText')};this.init()}async init(){this.elements.albumImage.src=FALLBACK_SVG;this.hideAuthButton();if(await this.handleAuthCallback())return;this.loadToken();if(this.accessToken&&this.isTokenValid())return this.startPolling();if(await this.refreshAccessToken())return this.startPolling();this.showPendingAuth();this.autoConnectSpotify()}loadToken(){this.accessToken=localStorage.getItem('spotify_access_token');this.tokenExpiry=localStorage.getItem('spotify_token_expiry');this.refreshToken=localStorage.getItem('spotify_refresh_token')}saveToken(accessToken,expiresIn=3600,refreshToken=null){this.accessToken=accessToken;this.tokenExpiry=Date.now()+expiresIn*1000;localStorage.setItem('spotify_access_token',accessToken);localStorage.setItem('spotify_token_expiry',this.tokenExpiry);if(refreshToken){this.refreshToken=refreshToken;localStorage.setItem('spotify_refresh_token',refreshToken)}}isTokenValid(){return this.tokenExpiry&&Date.now()<this.tokenExpiry-60000}setWidgetMode(mode,text,isEmpty=false){this.elements.widget.classList.remove('is-playing','is-paused','is-idle','is-empty');this.elements.widget.classList.add(mode);if(isEmpty)this.elements.widget.classList.add('is-empty');this.elements.statusText.textContent=text}hideAuthButton(){this.elements.authButton.style.display='none';this.elements.authButton.style.visibility='hidden';this.elements.authButton.style.pointerEvents='none'}showPendingAuth(){this.currentTrack=null;this.isPlaying=false;this.progress=0;this.duration=0;this.elements.trackName.textContent='Conectando Spotify';this.elements.artistName.textContent='Preparando autorizacion segura';this.elements.albumImage.src=FALLBACK_SVG;this.elements.progressBar.style.width='0%';this.setWidgetMode('is-idle','Conectando',true)}async handleAuthCallback(){const params=new URLSearchParams(window.location.search);const code=params.get('code');const error=params.get('error');if(error){localStorage.removeItem('spotify_pkce_verifier');this.showError('Autorizacion cancelada');window.history.replaceState({},document.title,window.location.pathname);return true}if(!code)return false;const codeVerifier=localStorage.getItem('spotify_pkce_verifier');if(!codeVerifier){this.showError('Falta verificador PKCE');window.history.replaceState({},document.title,window.location.pathname);return true}try{const token=await this.requestToken({grant_type:'authorization_code',code,redirect_uri:getRedirectUri(),client_id:SPOTIFY_CONFIG.clientId,code_verifier:codeVerifier});localStorage.removeItem('spotify_pkce_verifier');localStorage.removeItem('spotify_auth_attempted_at');this.saveToken(token.access_token,token.expires_in,token.refresh_token);window.history.replaceState({},document.title,window.location.pathname);this.startPolling()}catch(error){console.error('Error exchanging Spotify code:',error);localStorage.removeItem('spotify_pkce_verifier');this.showError('No pude completar Spotify')}return true}async requestToken(payload){const response=await fetch('https://accounts.spotify.com/api/token',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:new URLSearchParams(payload)});const data=await response.json();if(!response.ok)throw new Error(data.error_description||data.error||'Spotify token request failed');return data}async refreshAccessToken(){this.loadToken();if(!this.refreshToken)return false;try{const token=await this.requestToken({grant_type:'refresh_token',refresh_token:this.refreshToken,client_id:SPOTIFY_CONFIG.clientId});this.saveToken(token.access_token,token.expires_in,token.refresh_token);return true}catch(error){console.error('Error refreshing Spotify token:',error);localStorage.removeItem('spotify_access_token');localStorage.removeItem('spotify_token_expiry');localStorage.removeItem('spotify_refresh_token');return false}}async autoConnectSpotify(){const lastAttempt=parseInt(localStorage.getItem('spotify_auth_attempted_at')||'0',10);if(Date.now()-lastAttempt<AUTH_COOLDOWN_MS){this.elements.artistName.textContent='Esperando respuesta de Spotify';return}localStorage.setItem('spotify_auth_attempted_at',Date.now().toString());await connectSpotify()}async getCurrentTrack(){if(!this.isTokenValid()){if(await this.refreshAccessToken())return this.getCurrentTrack();this.showPendingAuth();this.autoConnectSpotify();return}try{const response=await fetch('https://api.spotify.com/v1/me/player/currently-playing',{headers:{Authorization:`Bearer ${this.accessToken}`}});if(response.status===401){localStorage.removeItem('spotify_access_token');localStorage.removeItem('spotify_token_expiry');if(await this.refreshAccessToken())return this.getCurrentTrack();this.showPendingAuth();this.autoConnectSpotify();return}if(response.status===204)return this.showNoTrack();const data=await response.json();if(!data.is_playing)return this.showPaused(data);this.updateTrackInfo(data)}catch(error){console.error('Error fetching current track:',error);this.showError()}}updateTrackInfo(data){if(!data.item)return this.showNoTrack();const track=data.item;const artists=track.artists.map(artist=>artist.name).join(', ');this.elements.trackName.textContent=track.name;this.elements.artistName.textContent=artists;this.elements.albumImage.src=track.album.images[0]?track.album.images[0].url:FALLBACK_SVG;this.currentTrack=track;this.isPlaying=true;this.progress=data.progress_ms;this.duration=track.duration_ms;this.elements.progressBar.style.width=`${(this.progress/this.duration)*100}%`;this.setWidgetMode('is-playing','Reproduciendo')}showPaused(data){if(!data.item)return this.showNoTrack();const track=data.item;const artists=track.artists.map(artist=>artist.name).join(', ');this.elements.trackName.textContent=track.name;this.elements.artistName.textContent=artists;this.elements.albumImage.src=track.album.images[0]?track.album.images[0].url:FALLBACK_SVG;this.currentTrack=track;this.isPlaying=false;this.progress=data.progress_ms||0;this.duration=track.duration_ms||0;this.elements.progressBar.style.width=this.duration>0?`${Math.min((this.progress/this.duration)*100,100)}%`:'0%';this.setWidgetMode('is-paused','En pausa')}showNoTrack(){this.currentTrack=null;this.isPlaying=false;this.progress=0;this.duration=0;this.elements.trackName.textContent='Sin reproduccion activa';this.elements.artistName.textContent='Inicia musica en Spotify';this.elements.albumImage.src=FALLBACK_SVG;this.elements.progressBar.style.width='0%';this.setWidgetMode('is-idle','Esperando musica',true)}showError(message='Conexion perdida'){this.currentTrack=null;this.isPlaying=false;this.progress=0;this.duration=0;this.elements.trackName.textContent='Conecta tu Spotify';this.elements.artistName.textContent='No pude leer la reproduccion';this.elements.albumImage.src=FALLBACK_SVG;this.elements.progressBar.style.width='0%';this.setWidgetMode('is-idle',message,true)}startPolling(){this.getCurrentTrack();if(this.pollingInterval)clearInterval(this.pollingInterval);if(this.progressInterval)clearInterval(this.progressInterval);this.pollingInterval=setInterval(()=>this.getCurrentTrack(),5000);this.progressInterval=setInterval(()=>{if(this.isPlaying&&this.duration>0){this.progress+=1000;this.elements.progressBar.style.width=`${Math.min((this.progress/this.duration)*100,100)}%`}},1000)}}
    async function connectSpotify(){const codeVerifier=generateCodeVerifier();const codeChallenge=await generateCodeChallenge(codeVerifier);localStorage.setItem('spotify_pkce_verifier',codeVerifier);const authParams=new URLSearchParams({response_type:'code',client_id:SPOTIFY_CONFIG.clientId,scope:SPOTIFY_CONFIG.scopes,redirect_uri:getRedirectUri(),code_challenge_method:'S256',code_challenge:codeChallenge});window.location.href=`https://accounts.spotify.com/authorize?${authParams.toString()}`}
    document.addEventListener('DOMContentLoaded',()=>new SpotifyWidget());
  </script>
</body>
</html>
